<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagonal Lines Logo</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #222;
        }
    </style>
</head>

<body>
    <svg width="400" height="400" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Black background -->
        <rect width="200" height="200" fill="#393a41" />

        <g transform="rotate(-10 100 100)">
            <!-- Green (Kirin) -->
            <line x1="95" y1="45" x2="155" y2="105" stroke="#42BF65" stroke-width="30" stroke-linecap="round"
                transform="rotate(15 125 75)" />

            <!-- Orange (Garunix) -->
            <line x1="70" y1="70" x2="130" y2="130" stroke="#ee9e24" stroke-width="30" stroke-linecap="round"
                transform="rotate(15 100 100)" />

            <!-- Blue (Barong) -->
            <line x1="45" y1="95" x2="105" y2="155" stroke="#449DE4" stroke-width="30" stroke-linecap="round"
                transform="rotate(15 75 125)" />
        </g>

    </svg>
</body>

</html>
