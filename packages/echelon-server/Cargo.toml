[package]
name = "echelon-server"
description = "A single-threaded server that receives and converts Project Ignis: EDOPro replay files into videos."
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://git.arqalite.org/COTFK/project-echelon"
readme = "README.md"
publish = false

[dependencies]
anyhow = "1.0.100"
axum = { version = "0.8.7", features = ["macros"] }
dotenvy = "0.15.7"
http-range-header = "0.4.1"
lzma-rs = "0.3.0"
nix = { version = "0.30.1", features = ["fs", "signal"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tempfile = "3.23.0"
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread", "fs", "process", "signal"] }
tower-http = { version = "0.6.7", features = ["cors"] }
tower_governor = "0.8.0"
tracing = "0.1.41"
tracing-subscriber = "0.3.20"
ulid = { version = "1.2.1", features = ["serde"] }

[dev-dependencies]
axum-test = "18.4.1"
